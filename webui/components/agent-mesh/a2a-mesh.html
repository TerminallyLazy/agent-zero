<div x-data="$store.agentMeshStore" x-init="init()" class="agent-mesh-container">
  <!-- Header -->
  <div class="mesh-header">
    <div class="header-content">
      <div class="title-section">
        <h1 class="mesh-title">Agent Mesh</h1>
        <p class="mesh-subtitle">Monitor and manage agent-to-agent communication, task delegation, and mesh topology</p>
      </div>
      <div class="header-actions">
        <div class="agent-count">
          <div class="status-dot"></div>
          <span x-text="Object.keys(agents).length || 0"></span> agents active
        </div>
        <button @click="updateAgents()" class="refresh-btn">
          <i class="fas fa-sync-alt"></i>
          Refresh
        </button>
        <button @click="clearRegistry()" class="clear-btn" style="margin-left: 8px;">
          <i class="fas fa-trash"></i>
          Clear Registry
        </button>
        <button @click="console.log('[Debug] Agents:', agents); console.log('[Debug] Tasks:', tasks); console.log('[Debug] Loading:', loading);" class="refresh-btn" style="margin-left: 8px; background: #6b7280;">
          <i class="fas fa-bug"></i>
          Debug
        </button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="mesh-content">
    <!-- Active Agents Panel -->
    <div class="agents-panel">
      <div class="panel-header">
        <h3>Active Agents</h3>
      </div>
      <div class="panel-body">
        <template x-if="loading">
          <div class="empty-state">
            <i class="fas fa-spinner fa-spin empty-icon"></i>
            <p>Loading agents...</p>
          </div>
        </template>
        
        <template x-if="!loading && Object.keys(agents).length === 0">
          <div class="empty-state">
            <i class="fas fa-desktop empty-icon"></i>
            <p>No agents connected</p>
            <button @click="updateAgents()" class="refresh-btn" style="margin-top: 1rem;">
              <i class="fas fa-sync-alt"></i>
              Refresh Agents
            </button>
          </div>
        </template>

        <div class="agents-list">
          <template x-for="agent in Object.values(agents)" :key="agent.card.agent_id">
            <div class="agent-card">
              <div class="agent-header">
                <div class="agent-status online"></div>
                <h4 class="agent-name" x-text="agent.card.agent_id"></h4>
              </div>
              <p class="agent-description" x-text="agent.card.role_description"></p>
              
              <div class="agent-tools">
                <div class="tools-label">Tools:</div>
                <div class="tools-list">
                  <template x-for="tool in agent.card.tools.slice(0, 3)" :key="tool">
                    <span class="tool-tag" x-text="tool"></span>
                  </template>
                  <template x-if="agent.card.tools.length > 3">
                    <span class="tool-tag more" x-text="`+${agent.card.tools.length - 3} more`"></span>
                  </template>
                </div>
              </div>
              
              <div class="agent-meta">
                <span>Trust: <strong x-text="agent.card.trust_level"></strong></span>
                <span>v<span x-text="agent.card.version"></span></span>
                <span class="last-seen" x-text="formatTimestamp(agent.lastSeen)"></span>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- Task Management Panel -->
    <div class="tasks-panel">
      <div class="panel-header">
        <h3>Task Negotiation</h3>
      </div>
      <div class="panel-body">
        <!-- Task Creation -->
        <div class="task-creation">
          <label class="form-label">Create New Task</label>
          <div class="input-group">
            <input 
              x-model="newGoal" 
              type="text" 
              placeholder="Describe what you need done..." 
              class="task-input"
              @keydown.enter="async () => {
                if (!newGoal.trim()) return;
                const result = await $store.agentMeshStore.executeTask(newGoal);
                if (result) {
                  selectedTask = result.task_id;
                  newGoal = '';
                }
              }"
            />
            <button 
              @click="async () => {
                if (!newGoal.trim()) return;
                const result = await $store.agentMeshStore.executeTask(newGoal);
                if (result) {
                  selectedTask = result.task_id;
                  newGoal = '';
                }
              }"
              class="propose-btn"
            >
              <i class="fas fa-plus"></i>
              Propose Task
            </button>
          </div>
        </div>

        <!-- Active Tasks -->
        <div class="tasks-list">
          <template x-if="Object.keys(tasks).length === 0">
            <div class="empty-state">
              <i class="fas fa-tasks empty-icon"></i>
              <h4>No Active Tasks</h4>
              <p>Create a task above to start delegating work to agents</p>
            </div>
          </template>

          <template x-for="task in Object.values(tasks)" :key="task.task_id">
            <div 
              class="task-card"
              :class="{ 'selected': selectedTask === task.task_id }"
              @click="selectedTask = task.task_id"
            >
              <div class="task-header">
                <div class="task-status">
                  <span 
                    class="status-badge"
                    :class="task.state"
                    x-text="task.state.toUpperCase()"
                  ></span>
                  <span class="task-id" x-text="task.task_id.substring(0, 8) + '...'"></span>
                </div>
                
                <template x-if="selectedTask === task.task_id && ['proposed', 'clarifying'].includes(task.state)">
                  <div class="task-actions">
                    <button 
                      @click.stop="updateTaskState(task.task_id, { state: 'clarifying' }); task.history.push({ event: 'clarification_requested', detail: 'Need more information', timestamp: new Date().toISOString() });"
                      class="action-btn clarify"
                    >
                      <i class="fas fa-question-circle"></i>
                      Clarify
                    </button>
                    <button 
                      @click.stop="updateTaskState(task.task_id, { state: 'accepted' }); task.history.push({ event: 'accepted', timestamp: new Date().toISOString() });"
                      class="action-btn accept"
                    >
                      <i class="fas fa-check"></i>
                      Accept
                    </button>
                    <button 
                      @click.stop="updateTaskState(task.task_id, { state: 'rejected' }); task.history.push({ event: 'rejected', reason: 'Not appropriate for this agent', timestamp: new Date().toISOString() });"
                      class="action-btn reject"
                    >
                      <i class="fas fa-times"></i>
                      Reject
                    </button>
                  </div>
                </template>
                
                <template x-if="selectedTask === task.task_id && task.state === 'running'">
                  <div class="task-actions">
                    <button 
                      @click.stop="updateTaskState(task.task_id, { state: 'cancelled' }); task.history.push({ event: 'cancelled', reason: 'Cancelled by user', timestamp: new Date().toISOString() });"
                      class="action-btn cancel"
                    >
                      <i class="fas fa-stop"></i>
                      Cancel
                    </button>
                  </div>
                </template>
              </div>
              
              <h4 class="task-goal" x-text="task.goal"></h4>
              <p class="task-meta">From: <strong x-text="task.initiator"></strong> • <span x-text="formatTimestamp(task.created_at)"></span></p>
              
              <!-- Progress indicator for running tasks -->
              <template x-if="task.state === 'running' && task.progress">
                <div class="task-progress">
                  <i class="fas fa-spinner fa-spin"></i>
                  <span x-text="task.progress"></span>
                </div>
              </template>

              <!-- Task History -->
              <template x-if="selectedTask === task.task_id && task.history.length > 0">
                <div class="task-history">
                  <h5 class="history-title">
                    <i class="fas fa-history"></i>
                    Task History
                  </h5>
                  <div class="history-list">
                    <template x-for="entry in task.history" :key="entry.timestamp">
                      <div class="history-entry">
                        <div class="history-dot" :class="entry.event"></div>
                        <div class="history-content">
                          <div class="history-header">
                            <span class="event-name" x-text="entry.event.replace('_', ' ').toUpperCase()"></span>
                            <span class="event-time" x-text="formatTimestamp(entry.timestamp)"></span>
                          </div>
                          <template x-if="entry.detail">
                            <p class="event-detail" x-text="entry.detail"></p>
                          </template>
                          <template x-if="entry.reason">
                            <p class="event-detail"><strong>Reason:</strong> <span x-text="entry.reason"></span></p>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- Provenance Trace -->
  <template x-if="selectedTask">
    <div class="provenance-panel">
      <div class="panel-header">
        <h3>
          <i class="fas fa-sitemap"></i>
          Provenance Trace
        </h3>
      </div>
      <div class="panel-body">
        <div class="terminal">
          <template x-if="provenance[selectedTask]">
            <pre class="trace-output" x-text="(() => {
              const buildTrace = (taskId, depth = 0) => {
                const node = provenance[taskId];
                if (!node) return '  '.repeat(depth) + `┗━ Task ${taskId} (unknown)\n`;
                
                const indent = '  '.repeat(depth);
                const connector = depth === 0 ? '┏━' : '┣━';
                let trace = `${indent}${connector} Task: ${taskId.substring(0, 8)}...\n`;
                trace += `${indent}   State: ${node.task.state}\n`;
                trace += `${indent}   Goal: ${node.task.goal}\n`;
                trace += `${indent}   Delegated: ${node.children ? node.children.length : 0} subtasks\n`;
                
                if (node.children && node.children.length > 0) {
                  node.children.forEach((childId, index) => {
                    trace += buildTrace(childId, depth + 1);
                  });
                }
                
                return trace;
              };
              
              return buildTrace(selectedTask) || 'No provenance data available';
            })()"></pre>
          </template>
          <template x-if="!provenance[selectedTask]">
            <div class="empty-trace">
              <i class="fas fa-sitemap empty-icon"></i>
              <h4>No Provenance Trace Available</h4>
              <p>Provenance is recorded when tasks are delegated to other agents</p>
            </div>
          </template>
        </div>
      </div>
    </div>
  </template>
</div>
