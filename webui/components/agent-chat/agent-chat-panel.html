<!-- Agent Chat Interface -->
<div class="agent-chat-container" x-show="isOpen" x-transition>
  <!-- Chat Header -->
  <div class="chat-header">
    <div class="chat-title">
      <span x-show="!activeThread">Agent Communication</span>
      <span x-show="activeThread">
        <span x-text="activeAgent?.name"></span>
        <small x-show="activeThread?.patientContext" x-text="'• ' + activeThread.patientContext"></small>
      </span>
    </div>
    <div class="chat-controls">
      <button class="chat-btn" @click="toggleMinimize()" :title="isMinimized ? 'Restore' : 'Minimize'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path x-show="!isMinimized" d="M6 19h12v2H6z"/>
          <path x-show="isMinimized" d="M6 14l3 3v-2h6v2l3-3-3-3v2H9v-2l-3 3z"/>
        </svg>
      </button>
      <button class="chat-btn" @click="closeChat()" title="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Chat Body -->
  <div class="chat-body" x-show="!isMinimized">
    <!-- Conversation List (when no active thread) -->
    <div x-show="!activeThread" class="conversation-list">
      <!-- Available Agents -->
      <div class="agents-section">
        <h4>Start New Conversation</h4>
        <div class="agent-grid">
          <template x-for="agent in availableAgents" :key="agent.id">
            <div class="agent-card" @click="startConversation(agent.id)">
              <div class="agent-avatar" x-text="agent.avatar"></div>
              <div class="agent-info">
                <div class="agent-name" x-text="agent.name"></div>
                <div class="agent-role" x-text="agent.role"></div>
                <div class="agent-specialty" x-text="agent.specialty"></div>
              </div>
              <div class="agent-status" :class="agent.status"></div>
            </div>
          </template>
        </div>
      </div>

      <!-- Recent Conversations -->
      <div class="recent-conversations" x-show="activeConversations.length > 0">
        <h4>Recent Conversations</h4>
        <div class="conversation-threads">
          <template x-for="conv in activeConversations" :key="conv.id">
            <div class="thread-item" @click="selectConversation(conv)">
              <div class="thread-avatar">
                <span x-text="availableAgents.find(a => a.id === conv.agentId)?.avatar"></span>
                <span class="unread-badge" x-show="conv.unread > 0" x-text="conv.unread"></span>
              </div>
              <div class="thread-info">
                <div class="thread-subject" x-text="conv.subject"></div>
                <div class="thread-preview" x-text="conv.lastMessage"></div>
                <div class="thread-time" x-text="formatTime(conv.timestamp)"></div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- Active Conversation Thread -->
    <div x-show="activeThread" class="active-conversation">
      <!-- Thread Header -->
      <div class="thread-header">
        <button class="back-btn" @click="activeThread = null; activeAgent = null;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
        </button>
        <div class="thread-agent-info">
          <div class="agent-header">
            <span class="agent-avatar-sm" x-text="activeAgent?.avatar"></span>
            <div>
              <div class="agent-name-sm" x-text="activeAgent?.name"></div>
              <div class="agent-role-sm" x-text="activeAgent?.role"></div>
            </div>
            <div class="connection-status" :class="isConnected ? 'connected' : 'disconnected'">
              <span x-text="isConnected ? 'Online' : 'Connecting...'"></span>
            </div>
          </div>
          <div class="agent-capabilities">
            <template x-for="capability in (activeAgent?.capabilities || [])" :key="capability">
              <span class="capability-tag" x-text="capability.replace('-', ' ')"></span>
            </template>
          </div>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages-container" style="flex: 1; min-height: 0; overflow-y: auto; max-height: 400px; height: 400px;">
        <template x-for="message in (activeThread?.messages || [])" :key="message.id">
          <div class="message" :class="message.sender === 'user' ? 'user-message' : 'agent-message'">
            <div class="message-content">
              <div class="message-text" x-html="renderMarkdown(message.content)"></div>
              <div class="message-time" x-text="formatTime(message.timestamp)"></div>
              <div x-show="message.reasoning" class="message-reasoning">
                <strong>Reasoning:</strong> <span x-html="renderMarkdown(message.reasoning)"></span>
              </div>
            </div>
          </div>
        </template>

        <!-- Typing Indicator -->
        <div x-show="activeAgent && isAgentTyping(activeAgent.id)" class="typing-indicator">
          <div class="typing-avatar" x-text="activeAgent?.avatar"></div>
          <div class="typing-animation">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="quick-btn" @click="quickMessage('review-labs')">Review Labs</button>
        <button class="quick-btn" @click="quickMessage('draft-response')">Draft Response</button>
        <button class="quick-btn" @click="quickMessage('check-medications')">Check Meds</button>
        <button class="quick-btn" @click="quickMessage('schedule-followup')">Schedule Follow-up</button>
      </div>

      <!-- Message Input -->
      <div class="message-input-container">
        <div class="message-input">
          <textarea 
            x-model="currentMessage" 
            placeholder="Type your message to the agent..."
            @keydown.enter.prevent="sendMessage()"
            @keydown.shift.enter.prevent="currentMessage += '\n'"
            rows="1"
          ></textarea>
          <button class="send-btn" @click="sendMessage()" :disabled="!currentMessage.trim()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">
          <span>Press Enter to send, Shift+Enter for new line</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Floating Chat Widget (when closed) -->
<div class="chat-widget" x-show="!isOpen" @click="toggleChat()">
  <div class="widget-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
    </svg>
  </div>
  <span class="unread-count" x-show="totalUnread > 0" x-text="totalUnread"></span>
  <div class="widget-tooltip">Chat with Agent Zero</div>
</div>
