<!-- Patient Context Panel -->
<div class="patient-panel">
  <!-- Search Section -->
  <div class="patient-search-section">
    <div class="search-header">
      <h3>Patient Search</h3>
    </div>
    <div class="search-container">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zM9.5 14C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input 
          type="text" 
          placeholder="Search by name, MRN, or phone..." 
          x-model="searchQuery"
          @input.debounce.300ms="search()"
          @keydown.escape="clearSelection()"
        />
        <span class="spinner" x-show="isSearching">⟳</span>
      </div>
      
      <!-- Search Results Dropdown -->
      <div class="search-results" x-show="searchResults.length > 0">
        <template x-for="patient in searchResults" :key="patient.id">
          <div class="search-result-item" @click="selectPatient(patient)">
            <div class="patient-name" x-text="patient.name"></div>
            <div class="patient-meta">
              <span x-text="'MRN: ' + patient.mrn"></span> • 
              <span x-text="formatAge(patient)"></span>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Recent Patients -->
  <div class="recent-patients" x-show="recentPatients.length > 0 && !selectedPatient">
    <h4>Recent Patients</h4>
    <div class="recent-list">
      <template x-for="patient in recentPatients" :key="patient.id">
        <div class="recent-patient-chip" @click="selectPatient(patient)">
          <div class="avatar" x-text="patient.name.split(' ').map(n => n[0]).join('')"></div>
          <span x-text="patient.name"></span>
        </div>
      </template>
    </div>
  </div>

  <!-- Selected Patient Details -->
  <div class="patient-details" x-show="selectedPatient">
    <div class="patient-header">
      <div class="patient-info">
        <h2 x-text="selectedPatient?.name"></h2>
        <div class="patient-demographics">
          <span class="demo-item">MRN: <strong x-text="selectedPatient?.mrn"></strong></span>
          <span class="demo-item" x-text="formatAge(selectedPatient)"></span>
          <span class="demo-item" x-text="selectedPatient?.phone"></span>
        </div>
      </div>
      <button class="btn ghost" @click="clearSelection()">×</button>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button class="btn" @click="messagePatient(selectedPatient)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
        </svg>
        Message
      </button>
      <button class="btn" @click="scheduleAppointment(selectedPatient)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/>
        </svg>
        Schedule
      </button>
      <button class="btn primary" @click="openChart(selectedPatient)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
        </svg>
        Open Chart
      </button>
      <button class="btn" @click="$store.agentChat.startConversation('agent-zero', {patient: selectedPatient.name}); $store.agentChat.quickMessage('I need to discuss patient ' + selectedPatient.name + '. Please review their current medications, allergies, and recent activity.')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
        </svg>
        Discuss with Agent
      </button>
    </div>

    <!-- Clinical Summary -->
    <div class="clinical-summary">
      <!-- Allergies & Medications -->
      <div class="summary-section">
        <h4>Allergies</h4>
        <div class="badge-list">
          <span class="badge danger" x-text="formatAllergies(selectedPatient?.allergies || [])"></span>
        </div>
      </div>

      <div class="summary-section">
        <h4>Current Medications</h4>
        <div class="med-list">
          <template x-for="med in (selectedPatient?.medications || [])" :key="med">
            <div class="med-item" x-text="med"></div>
          </template>
        </div>
      </div>

      <!-- Recent Labs -->
      <div class="summary-section" x-show="selectedPatient?.labs?.length > 0">
        <h4>Recent Labs</h4>
        <div class="lab-list">
          <template x-for="lab in (selectedPatient?.labs || [])" :key="lab.date + lab.type">
            <div class="lab-item">
              <span class="lab-date" x-text="lab.date"></span>
              <span class="lab-type" x-text="lab.type"></span>
              <span class="lab-value badge" :class="getStatusClass(lab.status)" x-text="lab.value"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- Appointments -->
      <div class="summary-section">
        <h4>Appointments</h4>
        <div class="appt-info">
          <div x-show="selectedPatient?.lastVisit">
            Last visit: <strong x-text="selectedPatient?.lastVisit"></strong>
          </div>
          <div x-show="selectedPatient?.nextAppt">
            Next appt: <strong x-text="selectedPatient?.nextAppt"></strong>
          </div>
          <div x-show="!selectedPatient?.nextAppt" class="muted">
            No upcoming appointments
          </div>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="summary-section" x-show="selectedPatient?.recentActivity?.length > 0">
        <h4>Recent Activity</h4>
        <div class="activity-timeline">
          <template x-for="activity in (selectedPatient?.recentActivity || [])" :key="activity.date + activity.desc">
            <div class="activity-item">
              <div class="activity-dot" :class="'type-' + activity.type"></div>
              <div class="activity-content">
                <div class="activity-date" x-text="activity.date"></div>
                <div class="activity-desc" x-text="activity.desc"></div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" x-show="!selectedPatient && recentPatients.length === 0">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" opacity="0.3">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
    </svg>
    <p>Search for a patient to view their context</p>
  </div>
</div>

<style>
.patient-panel {
  padding: 16px;
  height: 100%;
  overflow-y: auto;
}

.patient-search-section {
  margin-bottom: 20px;
}

.search-header h3 {
  margin: 0 0 12px 0;
  font-size: 18px;
  font-weight: 600;
}

.search-container {
  position: relative;
}

.search .spinner {
  animation: spin 1s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.search-results {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--panel-elev);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-top: 4px;
  max-height: 300px;
  overflow-y: auto;
  z-index: 10;
}

.search-result-item {
  padding: 10px 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}

.search-result-item:hover {
  background: rgba(76, 201, 240, 0.1);
}

.search-result-item:last-child {
  border-bottom: none;
}

.patient-name {
  font-weight: 600;
  color: var(--text);
}

.patient-meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.recent-patients {
  margin-bottom: 20px;
}

.recent-patients h4 {
  margin: 0 0 8px 0;
  font-size: 14px;
  color: var(--muted);
}

.recent-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.recent-patient-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px 4px 4px;
  background: var(--panel-elev);
  border: 1px solid var(--border);
  border-radius: 999px;
  cursor: pointer;
  font-size: 14px;
}

.recent-patient-chip:hover {
  border-color: var(--primary);
}

.recent-patient-chip .avatar {
  width: 24px;
  height: 24px;
  font-size: 10px;
}

.patient-details {
  background: var(--panel-elev);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}

.patient-header {
  display: flex;
  justify-content: space-between;
  align-items: start;
  margin-bottom: 16px;
}

.patient-info h2 {
  margin: 0 0 8px 0;
  font-size: 20px;
}

.patient-demographics {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 14px;
  color: var(--muted);
}

.demo-item strong {
  color: var(--text);
}

.quick-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.quick-actions .btn {
  display: flex;
  align-items: center;
  gap: 6px;
}

.clinical-summary {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.summary-section h4 {
  margin: 0 0 8px 0;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
}

.badge-list {
  display: flex;

  flex-wrap: wrap;

  display: flex;

.med-item {

  border-radius: 6px;
  font-size: 14px;
}

.lab-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.lab-item {
  display: flex;
  gap: 8px;

}

.lab-date {

}

.lab-type {
  font-weight: 600;
  min-width: 60px;
}

.lab-value {
  margin-left: auto;

.badge.danger {
  background: rgba(255, 93, 115, 0.2);
  color: #ff5d73;

.badge.warning {

  background: rgba(76, 217, 123, 0.2);

  flex-direction: column;

  font-size: 14px;

.appt-info strong {

}

.muted {
  color: var(--muted);

}

  display: flex;
  flex-direction: column;
  gap: 12px;
}

.activity-item {
  display: flex;

.activity-dot {

  background: var(--muted);
}

.activity-dot.type-visit {
  background: var(--primary);
}

.activity-dot.type-lab {
  background: var(--accent);
}

.activity-dot.type-message {
  background: var(--warning);

  flex: 1;
}

.activity-date {
  font-size: 12px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 300px;
  text-align: center;
  color: var(--muted);
}

.empty-state p {
  margin-top: 12px;
  font-size: 14px;
}
</style>
