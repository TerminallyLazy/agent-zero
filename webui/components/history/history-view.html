<!-- History & Audit View -->
<div class="main">
  <!-- Filters Bar -->
  <div class="filters">
    <div class="filter-group">
      <template x-for="option in filterOptions" :key="option.value">
        <div class="chip" :class="{active: filter === option.value}" @click="setFilter(option.value)" x-text="option.label"></div>
      </template>
    </div>
    <div class="filter-group">
      <template x-for="option in dateRangeOptions" :key="option.value">
        <div class="chip" :class="{active: dateRange === option.value}" @click="setDateRange(option.value)" x-text="option.label"></div>
      </template>
    </div>
    <button class="btn ghost" style="margin-left: auto;" @click="exportHistory()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
      </svg>
      Export
    </button>
  </div>

  <!-- Timeline Grid -->
  <div class="timeline-grid">
    <!-- Timeline List -->
    <div class="timeline-list">
      <div class="loading" x-show="isLoading">
        <span class="spinner">⟳</span> Loading history...
      </div>
      
      <template x-for="event in filteredEvents" :key="event.id">
        <div class="timeline-item" @click="selectEvent(event)">
          <div class="timeline-marker">
            <div class="timeline-icon" :class="getEventColor(event.type)" x-text="getEventIcon(event.type)"></div>
            <div class="timeline-line"></div>
          </div>
          
          <div class="timeline-content">
            <div class="timeline-header">
              <div class="timeline-time" x-text="formatTimestamp(event.timestamp)"></div>
              <span class="badge" :class="getCategoryBadgeClass(event.category)" x-text="event.category"></span>
            </div>
            
            <div class="timeline-action" x-text="event.action"></div>
            
            <div class="timeline-meta">
              <span x-show="event.user" x-text="event.user"></span>
              <span x-show="event.patient">• Patient: <span x-text="event.patient"></span></span>
              <span x-show="event.agent">• Agent: <span x-text="event.agent"></span></span>
            </div>
            
            <div class="timeline-description" x-text="event.description"></div>
          </div>
        </div>
      </template>
      
      <div class="empty-state" x-show="filteredEvents.length === 0 && !isLoading">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" opacity="0.3">
          <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
        </svg>
        <p>No events found for the selected filters</p>
      </div>
    </div>

    <!-- Detail Panel -->
    <div class="detail-panel" x-show="selectedEvent">
      <div class="detail-header">
        <h3>Event Details</h3>
        <button class="btn ghost" @click="closeDetail()">×</button>
      </div>
      
      <div class="detail-body" x-show="selectedEvent">
        <!-- Event Header -->
        <div class="event-header">
          <div class="event-icon" :class="getEventColor(selectedEvent?.type)" x-text="getEventIcon(selectedEvent?.type)"></div>
          <div>
            <div class="event-action" x-text="selectedEvent?.action"></div>
            <div class="event-time">
              <span x-text="formatDate(selectedEvent?.timestamp)"></span> at 
              <span x-text="formatTime(selectedEvent?.timestamp)"></span>
            </div>
          </div>
        </div>
        
        <!-- Event Info -->
        <div class="info-section">
          <div class="info-row">
            <span class="info-label">Type:</span>
            <span class="info-value" x-text="selectedEvent?.type?.replace('_', ' ')"></span>
          </div>
          <div class="info-row">
            <span class="info-label">Category:</span>
            <span class="badge" :class="getCategoryBadgeClass(selectedEvent?.category)" x-text="selectedEvent?.category"></span>
          </div>
          <div class="info-row" x-show="selectedEvent?.user">
            <span class="info-label">User:</span>
            <span class="info-value" x-text="selectedEvent?.user"></span>
          </div>
          <div class="info-row" x-show="selectedEvent?.patient">
            <span class="info-label">Patient:</span>
            <span class="info-value" x-text="selectedEvent?.patient"></span>
          </div>
          <div class="info-row" x-show="selectedEvent?.agent">
            <span class="info-label">Agent:</span>
            <span class="info-value" x-text="selectedEvent?.agent"></span>
          </div>
        </div>
        
        <!-- Description -->
        <div class="description-section">
          <h4>Description</h4>
          <p x-text="selectedEvent?.description"></p>
        </div>
        
        <!-- Details -->
        <div class="details-section" x-show="selectedEvent?.details && Object.keys(selectedEvent.details).length > 0">
          <h4>Additional Details</h4>
          <div class="details-content">
            <template x-for="[key, value] in Object.entries(selectedEvent?.details || {})" :key="key">
              <div class="detail-item">
                <span class="detail-key" x-text="key.replace(/_/g, ' ')"></span>:
                <span class="detail-value" x-text="typeof value === 'object' ? JSON.stringify(value) : value"></span>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>

.badge.warning {
  background: rgba(255, 183, 3, 0.2);

</style>
