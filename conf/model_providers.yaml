# Supported model providers for Agent Zero
# ---------------------------------------
#
# Each provider type ("chat", "embedding") contains a mapping of provider IDs
# to their configurations.
#
# The provider ID (e.g., "anthropic") is used:
#  - in the settings UI dropdowns.
#  - to construct the environment variable for the API key (e.g., ANTHROPIC_API_KEY).
#
# Each provider configuration requires:
#   name:             Human-readable name for the UI.
#   litellm_provider: The corresponding provider name in LiteLLM.
#
# Optional fields:
#   kwargs:           A dictionary of extra parameters to pass to LiteLLM.
#                     This is useful for `api_base`, `extra_headers`, etc.

chat:
  anthropic:
    name: Anthropic
    litellm_provider: anthropic
  deepseek:
    name: DeepSeek
    litellm_provider: deepseek
  gemini:
    name: Google
    litellm_provider: gemini
  groq:
    name: Groq
    litellm_provider: groq
  huggingface:
    name: HuggingFace
    litellm_provider: huggingface
  lm_studio:
    name: LM Studio
    litellm_provider: lm_studio
  mistral:
    name: Mistral AI
    litellm_provider: mistral
  ollama:
    name: Ollama
    litellm_provider: ollama
  openai:
    name: OpenAI
    litellm_provider: openai
  azure:
    name: OpenAI Azure
    litellm_provider: azure
  openrouter:
    name: OpenRouter
    litellm_provider: openrouter
    kwargs:
      extra_headers:
        "HTTP-Referer": "https://agent-zero.ai/"
        "X-Title": "Agent Zero"
  sambanova:
    name: Sambanova
    litellm_provider: sambanova
  venice:
    name: Venice
    litellm_provider: openai
    kwargs:
      api_base: https://api.venice.ai/api/v1
  other:
    name: Other OpenAI compatible
    litellm_provider: openai

# ACP + A2A Integration Settings
# ------------------------------
# Configuration for Agent Communication Protocol (ACP) and Agent-to-Agent (A2A)
# protocol integrations with remote LLM providers

acp_providers:
  # Remote ACP agents providing LLM services
  research_agent:
    name: Research Agent (ACP)
    endpoint: "https://research-agent.example.com"
    protocol: "acp"
    capabilities: ["llm_call", "web_search", "data_analysis"]
    model_mapping:
      gpt-4: "primary_model"
      gpt-3.5-turbo: "fast_model"
    timeout: 60.0
    
  analysis_agent:
    name: Analysis Agent (ACP)
    endpoint: "https://analysis-agent.example.com"
    protocol: "acp"
    capabilities: ["llm_call", "chart_generation", "statistical_analysis"]
    model_mapping:
      claude-3-opus: "detailed_model"
      claude-3-haiku: "quick_model"
    timeout: 120.0

a2a_providers:
  # Remote A2A agents providing LLM services
  specialist_agent:
    name: AI Specialist Agent (A2A)
    endpoint: "https://specialist.example.com/rpc" 
    protocol: "a2a"
    capabilities: ["llm_call", "code_generation", "technical_writing"]
    model_mapping:
      gpt-4: "coding_model"
      claude-3-opus: "writing_model"
    timeout: 90.0
    
  creative_agent:
    name: Creative Writing Agent (A2A)
    endpoint: "https://creative.example.com/"
    protocol: "a2a"
    capabilities: ["llm_call", "story_generation", "creative_writing"]
    model_mapping:
      gpt-4: "creative_model"
      claude-3-opus: "narrative_model"
    timeout: 180.0

# Protocol Configuration
protocols:
  acp:
    discovery_path: "/.well-known/agent.yml"
    message_endpoint: "/message"
    session_timeout: 300.0
    max_retries: 3
    
  a2a:
    discovery_methods: ["getAgentCard"]
    rpc_paths: ["/rpc", "/", ""]
    task_timeout: 1800.0
    max_retries: 2
    
embedding:
  huggingface:
    name: HuggingFace
    litellm_provider: huggingface
  google:
    name: Google
    litellm_provider: gemini
  lm_studio:
    name: LM Studio
    litellm_provider: lm_studio
  mistral:
    name: Mistral AI
    litellm_provider: mistral
  ollama:
    name: Ollama
    litellm_provider: ollama
  openai:
    name: OpenAI
    litellm_provider: openai
  azure:
    name: OpenAI Azure
    litellm_provider: azure
  other:
    name: Other OpenAI compatible
    litellm_provider: openai