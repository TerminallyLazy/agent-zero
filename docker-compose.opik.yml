

services:  
  opik:  
    image: mcp/opik:latest  
    ports:  
      - "5173:5173"  
    environment:  
      - OPIK_DATABASE_URL=sqlite:///opik.db  
    volumes:  
      - opik_data:/app/data  
    networks:  
      - agent-zero-network  
  
volumes:  
  opik_data:  
  
networks:  
  agent-zero-network:  
    driver: bridge